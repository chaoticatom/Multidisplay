; Bare-minimum blink + serial print test - zero HUB75/Adafruit dependencies.
; Purpose: isolate whether the ESP32-S3 + COM3 + pio device monitor
; combination can produce ANY visible serial output at all right now, before
; blaming the HUB75 library or any diagnostic-specific code for total
; silence seen in firmware/hub75_diagnostic.
;
;   cd firmware/bare_serial_test
;   pio run --target upload
;   pio device monitor

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Matching the main firmware's board_build overrides exactly - it turns out
; this board's serial console genuinely needs these to work at all. Without
; them (the "plain defaults" this file originally used), the board still ran
; code fine (LED blinked) but produced zero serial output - a flash/
; partition-table mismatch against the real N16R8 hardware apparently breaks
; just the USB-CDC console, not general execution.
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions_16MB.csv

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

monitor_speed = 115200
upload_speed = 921600
