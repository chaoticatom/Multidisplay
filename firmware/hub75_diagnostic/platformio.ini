; PlatformIO Project Configuration File
; Standalone HUB75 wiring diagnostic - independent of the main Multidisplay
; firmware. Build/flash this on its own:
;
;   cd firmware/hub75_diagnostic
;   pio run --target upload
;   pio device monitor

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Deliberately NOT copying the main firmware's PSRAM/16MB-flash/custom-
; partition-table overrides here - this diagnostic never allocates PSRAM
; (no ps_malloc, no big frame buffers), so those overrides would just be
; claiming a flash/PSRAM config with no matching partition table sized for
; it, which can cause an early boot failure that's completely invisible on
; this board's native USB-Serial/JTAG console (genuine crashes before the
; app's own USB stack comes up never reach a monitor at all - they just
; look like total silence). Plain board defaults are what a PSRAM-free
; sketch like this one actually needs.

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.11
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
