; PlatformIO Project Configuration File
; Standalone HUB75 wiring diagnostic - independent of the main Multidisplay
; firmware. Build/flash this on its own:
;
;   cd firmware/hub75_diagnostic
;   pio run --target upload
;   pio device monitor

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Only needed if your board actually has PSRAM and you want to rule that
; variable out too - safe to leave in even if unused. See the main
; firmware's platformio.ini for why these specific values (N16R8 hardware).
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.f_flash = 80000000L

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.11
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
