; PlatformIO Project Configuration File
; Standalone HUB75 wiring diagnostic - independent of the main Multidisplay
; firmware. Build/flash this on its own:
;
;   cd firmware/hub75_diagnostic
;   pio run --target upload
;   pio device monitor

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Matching the main firmware's board_build overrides exactly - confirmed via
; a bare blink+serial test that this board's USB-CDC console genuinely needs
; these to produce any output at all. Without them, code still ran fine
; (LED blinked, so no crash) but zero serial output ever appeared - a
; flash/partition-table mismatch against the real N16R8 hardware apparently
; breaks just the USB-CDC console, not general execution. (An earlier
; version of this file removed these on the theory that a PSRAM-free sketch
; doesn't need them - that theory was wrong; put back per real hardware
; test results.)
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions_16MB.csv

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.11
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
