; PlatformIO Project Configuration File
; Full HUB75 scan-rate / addressing / mapping / driver diagnostic.
; Standalone project, independent of the main Multidisplay firmware.
;
;   cd firmware/hub75_full_diagnostic
;   pio run --target upload
;   pio device monitor

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; N16R8 hardware (16MB flash, 8MB quad-SPI PSRAM). Confirmed necessary on
; this exact board for the USB-CDC serial console to produce any output at
; all - see firmware/hub75_diagnostic's platformio.ini history for the full
; story. Without these, code still runs (GPIO/LED fine) but serial is
; silent and PSRAM allocation fails.
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions_16MB.csv

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.11
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
