; PlatformIO Project Configuration File
; ESP32-S3 RGB LED Cube firmware (Multidisplay)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- N16R8: 16MB flash, 8MB quad-SPI PSRAM ---
; The generic "esp32-s3-devkitc-1" board definition defaults to an 8MB
; flash / no-PSRAM variant (confirmed via `pio run -v` showing
; "ESP32-S3-DevKitC-1-N8 ... No PSRAM"). These two overrides force the
; actual N16R8 hardware config regardless of that default — without them,
; psramFound() returns false and the PSRAM frame buffer allocation in
; main.cpp's allocBuffers() fails at boot even though the firmware compiles
; fine.
;
; memory_type must be qio_qspi, NOT qio_opi: ESP32-S3-WROOM-1 modules (which
; is what's on this board, "N16R8" printed on it) use quad-SPI PSRAM.
; qio_opi is for octal-SPI PSRAM (WROOM-2 and similar modules) - setting the
; wrong one made the SDK think PSRAM was unusable at boot ("Not enough
; memory for requested colour depth" from the HUB75 library, plus knock-on
; WiFi task creation failures from the same broken memory init).
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
; f_flash stays 80MHz: tried dropping to 40MHz to ease PSRAM enumeration
; ("PSRAM ID read error: 0x00ffffff" appearing consistently late in a long
; session of resets/reflashes), but this framework version has no prebuilt
; qio_40m bootloader ("bootloader_qio_40m.elf not found") - only specific
; flash_mode/freq combos ship one. 80MHz was also already the setting during
; every earlier successful boot tonight, so it likely isn't the actual
; variable at fault anyway.
board_build.f_flash = 80000000L
board_build.partitions = partitions_16MB.csv
board_build.filesystem = littlefs

; Tried underclocking to 160MHz to ease PSRAM enumeration - reverted. It
; didn't fix PSRAM (failed again on the very next boot, identical config to
; a boot that had succeeded) and caused a NEW failure: the HUB75 library's
; internal DMA timing is calibrated for the default 240MHz clock, so
; underclocking made the display task miss watchdog deadlines
; ("task_wdt... Tasks currently running: CPU 0: display... Aborting").
board_build.f_cpu = 240000000L

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=2

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    esphome/AsyncTCP-esphome @ ^2.0.1
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.11
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
    bblanchon/ArduinoJson @ ^7.0.4
    tzapu/WiFiManager @ ^2.0.17
