; PlatformIO Project Configuration File
; ESP32-S3 RGB LED Cube firmware (Multidisplay)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- N16R8: 16MB flash, 8MB octal PSRAM ---
; The generic "esp32-s3-devkitc-1" board definition defaults to an 8MB
; flash / no-PSRAM variant (confirmed via `pio run -v` showing
; "ESP32-S3-DevKitC-1-N8 ... No PSRAM"). These two overrides force the
; actual N16R8 hardware config regardless of that default — without them,
; psramFound() returns false and the PSRAM frame buffer allocation in
; main.cpp's allocBuffers() fails at boot even though the firmware compiles
; fine.
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions_16MB.csv
board_build.filesystem = littlefs

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=2

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    esphome/AsyncTCP-esphome @ ^2.0.1
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.11
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
    bblanchon/ArduinoJson @ ^7.0.4
    tzapu/WiFiManager @ ^2.0.17
